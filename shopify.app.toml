client_id = "9a4205afa7a3d399df6e7c9992a1bfca"
name = "Verifly"
handle = "verifly"
application_url = "https://verifly.gadget.app/api/shopify/install-or-render"
embedded = true

[build]

[webhooks]
api_version = "2025-01"

[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact" ,"shop/redact"]
uri = "https://verifly.gadget.app/api/webhooks/shopify"

[auth]
redirect_urls = [
  "https://verifly.gadget.app/api/connections/auth/shopify/callback"
]

[app_proxy]
url = "https://verifly.gadget.app/proxy/"
subpath = "proxy"
prefix = "apps"

[pos]
embedded = false
